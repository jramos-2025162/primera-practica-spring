<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Biografía</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e3a8a, #38bdf8);
        padding: 20px;
    }
    .contenedor { width: 100%; max-width: 500px; }
    .tarjeta {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        padding: 35px 30px;
        text-align: center;
        animation: aparecer 0.6s ease;
    }
    @keyframes aparecer {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .titulo { font-size: 30px; color: #0f172a; margin-bottom: 20px; }
    .foto-perfil {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #2563eb;
        margin-bottom: 20px;
    }
    .bio-texto {
        font-size: 15px;
        color: #475569;
        line-height: 1.6;
        text-align: justify;
        margin-bottom: 25px;
        background: #f8fafc;
        padding: 15px;
        border-radius: 16px;
    }
    .acciones { display: flex; flex-direction: column; gap: 10px; }
    .boton {
        display: block;
        padding: 12px;
        border-radius: 12px;
        text-decoration: none;
        background: linear-gradient(135deg, #2563eb, #0ea5e9);
        color: white;
        font-weight: bold;
        transition: all 0.3s ease;
    }
    .boton:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }
  </style>
</head>
<body>
<div class="contenedor">
  <div class="tarjeta">
    <h1 class="titulo" th:text="${titulo}">Mi Biografía</h1>
    <img th:src="@{/yo.jpg}" alt="Mi Foto" class="foto-perfil">
    <p class="bio-texto" th:text="${contenido}"></p>

    <div class="acciones">
      <a class="boton" th:href="@{/home}">Ir a Home</a>
      <a class="boton" th:href="@{/usuario}">Ir a Usuario</a>
      <a class="boton" th:href="@{/datos}">Ir a Datos</a>
    </div>
  </div>
</div>
</body>
</html>
