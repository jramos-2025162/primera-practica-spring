<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        /* Copiado de tu bloque de CSS home */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #0f172a, #1e3a8a, #38bdf8); padding: 20px; }
        .contenedor { width: 100%; max-width: 420px; }
        .tarjeta { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border-radius: 24px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25); padding: 35px 30px; text-align: center; }
        .titulo { font-size: 30px; color: #0f172a; margin-bottom: 10px; }
        .usuario-nombre { font-weight: bold; color: #2563eb; }
        .acciones { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .boton { display: block; padding: 14px; border-radius: 14px; text-decoration: none; background: linear-gradient(135deg, #2563eb, #0ea5e9); color: white; font-weight: bold; transition: 0.3s; }
        .logout-btn { background: linear-gradient(135deg, #dc2626, #ef4444); border:none; width:100%; cursor:pointer; }
    </style>
</head>
<body>
<div class="contenedor">
    <div class="tarjeta">
        <h1 class="titulo">Bienvenido</h1>
        <p class="subtitulo">Hola, <span class="usuario-nombre" th:text="${username}">Usuario</span></p>
        <div class="acciones">
            <a class="boton" th:href="@{/usuario}">Ir a Usuario</a>
            <a class="boton" th:href="@{/datos}">Ir a Datos</a>
            <a class="boton" th:href="@{/biografia}">Ver mi Biografía</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="boton logout-btn">Cerrar Sesión</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
